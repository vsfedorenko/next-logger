# git-cliff configuration — generates CHANGELOG.md from conventional commits
# https://git-cliff.org/docs/configuration

[changelog]
header = """# Changelog

All notable changes to this project are generated automatically from
[conventional commits](https://www.conventionalcommits.org/) via
[git-cliff](https://git-cliff.org).

"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}](https://github.com/vsfedorenko/next-logger/releases/tag/{{ version }}) — {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}

{% for commit in commits %}
- {% if commit.scope %}**{{ commit.scope }}:** {% endif %}{{ commit.message | upper_first }} ([`{{ commit.id | truncate(length=7, end="") }}`](https://github.com/vsfedorenko/next-logger/commit/{{ commit.id }}))
{% endfor %}\
{% endfor %}\
"""
trim = true
footer = ""

[git]
conventional_commits = true
filter_unconventional = true
commit_parsers = [
  { message = "^feat", group = "Added" },
  { message = "^fix", group = "Fixed" },
  { message = "^perf", group = "Performance" },
  { message = "^refactor", group = "Changed" },
  { message = "^docs", group = "Documentation" },
  { message = "^ci", group = "CI" },
  { message = "^chore", skip = true },
  { message = "^revert", group = "Reverted" },
]
filter_commits = true
tag_pattern = "v[0-9].*"
sort_commits = "oldest"
